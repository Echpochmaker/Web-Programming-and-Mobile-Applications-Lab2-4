<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пройти тест</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/take-test.css">
</head>
<body>
    <!-- Навигационная панель -->
<nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h2>📚 Тесты</h2>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Мои тесты</a>
                <a href="/take-test" class="nav-link">Пройти тест</a>
                <a href="/results-page" class="nav-link">📊 Результаты</a>
            </div>
            <div class="nav-right">
                <div class="widget-container" id="widgetContainer"></div>
                <div class="nav-user" id="navUser">
                    <div class="loading-spinner">Загрузка...</div>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        <h1>Доступные тесты</h1>

        <!-- ========== РЕЖИМ: СПИСОК ТЕСТОВ ========== -->
        <div id="testsListMode">
            <div class="card">
                <div class="filters">
                    <input type="text" id="searchFilter" placeholder="Поиск по названию..." class="search-input">
                </div>
                <div id="availableTestsList" class="tests-list">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>

        <!-- ========== РЕЖИМ: ПРОХОЖДЕНИЕ ТЕСТА ========== -->
        <div id="testTakingMode" style="display: none;">
            <button class="btn btn-secondary" onclick="goBackToList()" style="margin-bottom: 20px;">← К списку тестов</button>
            <div class="card">
                <h2 id="takingTestTitle">Прохождение теста</h2>
                <div id="testProgress" class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div id="questionsContainer"></div>
                <button id="finishTestBtn" class="btn" style="display: none;">Завершить тест</button>
            </div>
        </div>

        <!-- ========== РЕЖИМ: РЕЗУЛЬТАТ ТЕСТА ========== -->
        <div id="testResultMode" style="display: none;">
            <div class="card">
                <h2 id="resultTitle">Результат теста</h2>
                <div id="resultScore" class="result-score"></div>
                <div id="resultDetails"></div>
                <button onclick="goBackToList()" class="btn">К списку тестов</button>
            </div>
        </div>
    </div>

    <!-- Модальные окна (копируем из index.html) -->
    <div id="loginModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Вход</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email или телефон:</label>
                    <input type="text" id="loginInput" required>
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="passwordInput" required>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="#" id="switchToRegister">Зарегистрироваться</a></p>
            <p><a href="#" id="forgotPasswordLink">Забыли пароль?</a></p>
            <p><button onclick="yandexOAuth()" class="yandex-link-btn">Войти через Яндекс</button></p>
        </div>
    </div>

    <div id="registerModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Телефон (необязательно):</label>
                    <input type="text" id="regPhone">
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
            </form>
            <p>Уже есть аккаунт? <a href="#" id="switchToLogin">Войти</a></p>
        </div>
    </div>

    <div id="forgotPasswordModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Восстановление пароля</h2>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="forgotEmail" required>
                </div>
                <button type="submit" class="btn">Отправить</button>
            </form>
            <div id="forgotMessage" class="message" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script src="/static/auth.js"></script>
    <script src="/static/modals.js"></script>
    <script src="/static/take-test.js"></script>
</body>
</html>
